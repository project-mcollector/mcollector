services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: mcollector
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mcollector"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-cluster.sh cluster-id --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: ../../apps/api
      dockerfile: src/Ingestion.Api/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Kafka__BootstrapServers=kafka:9092

  analytics:
    build:
      context: ../../apps/api
      dockerfile: src/Analytics.Api/Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Kafka__BootstrapServers=kafka:9092

  identity:
    build:
      context: ../../apps/api
      dockerfile: src/Identity.Api/Dockerfile
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Kafka__BootstrapServers=kafka:9092

  processor:
    build:
      context: ../../apps/api
      dockerfile: src/EventProcessor/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=mcollector;Username=app;Password=app
      - Kafka__BootstrapServers=kafka:9092

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - ingestion
      - analytics
      - identity
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
